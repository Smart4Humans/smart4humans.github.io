<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Service - Smart4Humans</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: #f8f9fa; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .provider-info { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; }
        input:focus, textarea:focus { outline: none; border-color: #2563eb; }
        textarea { min-height: 100px; resize: vertical; }
        .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        .submit-btn { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .submit-btn:hover { background: #1d4ed8; }
        .note { margin-top: 20px; padding: 16px; background: #f0fdf4; border-left: 4px solid #22c55e; color: #166534; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to providers</a>
        <h1>Book a Service</h1>
        <div class="provider-info"><h2 id="provider-name">Select a provider</h2><p>Fill out the details below</p></div>
        <form id="service-form">
            <div class="form-group"><label>Property Address *</label><input type="text" name="address" placeholder="123 Main St, Vancouver, BC" required></div>
            <div class="form-group"><label>What needs doing? *</label><div class="checkbox-group"><div class="checkbox-item"><input type="checkbox" name="services" value="door-repair"><label>Door Repair</label></div><div class="checkbox-item"><input type="checkbox" name="services" value="tv-mounting"><label>TV Mounting</label></div><div class="checkbox-item"><input type="checkbox" name="services" value="painting"><label>Painting</label></div><div class="checkbox-item"><input type="checkbox" name="services" value="furniture-assembly"><label>Furniture Assembly</label></div><div class="checkbox-item"><input type="checkbox" name="services" value="cleaning"><label>Cleaning</label></div><div class="checkbox-item"><input type="checkbox" name="services" value="junk-removal"><label>Junk Removal</label></div></div></div>
            <div class="form-group"><label>Job Details</label><textarea name="description" placeholder="Tell us more about what needs to be done..."></textarea></div>
            <div class="form-group"><label>Preferred Date *</label><input type="date" name="date" required></div>
            <div class="form-group"><label>Your Name *</label><input type="text" name="agentName" placeholder="Jane Smith" required></div>
            <div class="form-group"><label>Your Phone *</label><input type="tel" name="agentPhone" placeholder="(604) 555-1234" required></div>
            <div class="form-group"><label>Your Email</label><input type="email" name="agentEmail" placeholder="jane@example.com"></div>
            <div class="note"><strong>What happens next?</strong><br>We'll confirm with the provider and text you within 10 minutes.</div>
            <button type="submit" class="submit-btn">Submit Booking</button>
        </form>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const provider = urlParams.get('provider');
        const providers = {'mike-t': 'Mike T.', 'john-d': 'John D.', 'sarah-l': 'Sarah L.', 'david-k': 'David K.'};
        if (providers[provider]) document.getElementById('provider-name').textContent = providers[provider];
        document.querySelector('form').addEventListener('submit', function(e) { e.preventDefault(); alert('Booking submitted! (Demo mode - no SMS sent yet)'); });
    </script>
</body>
</html>
